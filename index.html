<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Membresía Empresarial HSAI Chapultepec</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-logo-banner">
  <img src="logodsai.jpg" alt="DSA Logo" class="top-logo">
</div>

<main class="main-content">
  <div class="scene-container">
    <div class="scene">
      <div class="card" id="card">
        <div class="card-inner">
          <div class="card-front" id="cardFront">
            <div class="logo-header">
              <h1 class="card-title">Membresía<br>Empresarial</h1>
            </div>
            
            <div class="form-section-card">
              <div class="field full">
                <label>Nombre de la Empresa</label>
                <input type="text" class="input-glass" id="empresa" list="empresasList" placeholder="Escribe o selecciona" required>
              </div>
              
              <div class="fields-row">
                <div class="field">
                  <label>Nombre Completo</label>
                  <input type="text" class="input-glass" id="empleado" placeholder="Nombre completo" required>
                </div>
                <div class="field">
                  <label>Número de Teléfono</label>
                  <input type="tel" class="input-glass" id="telefono" placeholder="5512345678" required>
                </div>
              </div>
              
              <div class="field full">
                <label>Correo corporativo</label>
                <input type="email" class="input-glass" id="correo" placeholder="correo@empresa.com" required>
              </div>
              
              <div class="accept-terms">
                <input type="checkbox" id="acceptTerms">
                <label for="acceptTerms">Acepto términos y aviso de privacidad</label>
              </div>
              
              <button id="btnContinuar" class="btn-continuar" disabled>Continuar</button>

                            <!-- BOTONES WALLET FUNCIONALES -->
              <div id="wallet-buttons" style="margin-top: 20px; display: flex; flex-direction: column; gap: 14px; align-items: center; width: 100%;">
                <button id="btnGoogleWallet" class="btn-wallet-simple google">
                  <i class="fab fa-google"></i> Agregar a Google Wallet
                </button>
                
                <button id="btnAppleWallet" class="btn-wallet-simple apple">
                  <i class="fab fa-apple"></i> Agregar a Apple Wallet
                </button>
              </div>
            </div>
          </div>
          
          <div class="card-back" id="cardBack">
            <!-- Beneficios (mantengo igual) -->
          </div>
        </div>
      </div>
      <button id="flip-arrow" class="flip-arrow">→</button>
    </div>
  </div>
</main>

<!-- Resto del footer y modal se mantienen igual -->

<datalist id="empresasList">
  <option value="Seguros Monterrey / GMM"></option>
  <option value="Universidad Londres"></option>
  <option value="Alsea"></option>
</datalist>

<script src="script.js"></script>
</body>
</html>
